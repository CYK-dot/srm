name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema jinja2 pytest

      - name: Run tests
        run: cd test/testcase_tests && pytest python_tests -v

  c-tests:
    name: C Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python packages
        run: pip install jsonschema jinja2

      - name: Configure CMake
        run: cd test && mkdir -p build && cd build && cmake ..

      - name: Build
        run: cd test/build && cmake --build .

      - name: Run tests
        run: cd test/build && ctest --output-on-failure
